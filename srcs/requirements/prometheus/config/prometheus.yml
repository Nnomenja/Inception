global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'nginx'
    metrics_path: /metrics
    static_configs:
      - targets:
        - 'nginx-prometheus-exporter:9113'
  - job_name: 'mariadb'
    metrics_path: /metrics
    static_configs:
      - targets:
        - 'mysqld_exporter:9104'
  - job_name: 'php-fpm'
    metrics_path: /metrics
    static_configs:
      - targets:
        - 'php-fpm-exporter:9253'
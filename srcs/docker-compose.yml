version: '3.9'

services:
    mariadb:
        build:
            context: ./requirements/mariadb
            dockerfile: Dockerfile
        image: mariadb
        secrets:
            - db_root_password
            - db_user_password
        environment:
            MYSQL_ROOT_PASSWORD: /run/secrets/db_root_password  
            MYSQL_USER_PASSWORD: /run/secrets/db_user_password
        env_file:
            - .env
        volumes:
            - mariadb_data:/var/lib/mysql
        networks:
            - my_network
        restart: unless-stopped
    wordpress:
        build:
            context: ./requirements/wordpress
            dockerfile: Dockerfile
        image: wordpress
        environment:
            WORDPRESS_DB_USER: ${MYSQL_USER_NAME}
            WORDPRESS_DB_PASSWORD: /run/secrets/db_user_password
            WORDPRESS_DB_NAME: ${MYSQL_DB}
            WORDPRESS_ADMIN_PASSWORD: /run/secrets/wp_admin_password
            WORDPRESS_USER_PASSWORD: /run/secrets/wp_user_password
        env_file:
            - .env
        secrets:
            - db_user_password
            - wp_admin_password
            - wp_user_password
        depends_on:
            - mariadb
        volumes:
            - wordpress_data:/var/www/html/wordpress
        networks:
            - my_network
        restart: unless-stopped
    nginx:
        build:
            context: ./requirements/nginx
            dockerfile: Dockerfile
        image: nginx
        ports:
            - "443:443"
        depends_on:
            - wordpress
        volumes:
            - wordpress_data:/var/www/html/wordpress
        networks:
            - my_network
        restart: unless-stopped

secrets:
    db_root_password:
        file: ../secrets/db_root_password.txt
    db_user_password:
        file: ../secrets/db_user_password.txt
    wp_admin_password:
        file: ../secrets/wp_admin_password.txt
    wp_user_password:
        file: ../secrets/wp_user_password.txt

volumes:
    mariadb_data:
        driver: local
        driver_opts:
            type: none
            device: /home/nnomenja/data/mysql
            o: bind

    wordpress_data:
        driver: local
        driver_opts:
            type: none
            device: /home/nnomenja/data/wordpress
            o: bind
    
networks:
    my_network:
        driver: bridge